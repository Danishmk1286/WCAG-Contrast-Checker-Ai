      if(!window.Long){

        window.Long.fromString=function(s,u,r){if(!s)return new window.Long(0,u);r=r||16;var v=parseInt(String(s),r);if(isNaN(v))v=0;var l=new window.Long(v,u);l.low=v&0xFFFFFFFF;l.high=Math.floor(v/0x100000000)&0xFFFFFFFF;return l};
        window.Long.fromNumber=function(n,u){var l=new window.Long(n,u);l.low=n&0xFFFFFFFF;l.high=Math.floor(n/0x100000000)&0xFFFFFFFF;return l};

        window.Long.prototype.toString=function(r){r=r||10;return(this.high*0x100000000+(this.low>>>0)).toString(r)}
